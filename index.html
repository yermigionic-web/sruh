<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>서록대학병원 | Seorok University Hospital Official</title>

<!-- ===================== 외부 폰트 (한국어/영어 공용) ===================== -->
<!-- Pretendard: 한글+라틴을 SF Pro 느낌으로 통일감 있게 렌더링 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&display=swap">

<style>
/* =======================================================================
   서록대학병원 — 디자인 토큰
   palette : paper white · graphite gray · light mint(소량) · silver(metallic)
   black은 텍스트에만 사용
   ======================================================================= */
:root{
  --paper:#f2f3f5;
  --surface:#ffffff;
  --surface-2:#f7f8fa;
  --ink:#16181b;
  --ink-soft:#6a7178;
  --ink-faint:#9aa1a8;
  --line:#e7e9ec;

  --mint:#54c7ac;          /* 포인트, 소량만 */
  --mint-deep:#2f9b83;
  --mint-soft:#def4ee;

  --graphite:#26292e;      /* 어두운 회색 패널 */
  --graphite-2:#33373d;

  /* 실버 메탈릭 그라데이션 */
  --silver:linear-gradient(135deg,#eef0f3 0%,#fbfcfd 22%,#c5cbd2 50%,#f3f5f7 74%,#d6dadf 100%);
  --silver-edge:linear-gradient(135deg,#fdfdfe,#b9c0c8 48%,#fdfefe);

  --r-lg:24px; --r-md:18px; --r-sm:12px; --r-pill:999px;

  --sh-1:0 1px 2px rgba(22,24,27,.05),0 4px 14px rgba(22,24,27,.06);
  --sh-2:0 2px 6px rgba(22,24,27,.06),0 16px 40px rgba(22,24,27,.10);
  --sh-card:0 1px 1px rgba(22,24,27,.04),0 10px 30px rgba(22,24,27,.08);

  --ff:"Pretendard","Pretendard Variable",system-ui,-apple-system,sans-serif;
  --ff-en:"Cormorant Garamond",serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--ff);
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 50% -10%, #fafbfc 0%, var(--paper) 60%) fixed;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  letter-spacing:-.01em;
}

/* ===== 모바일 우선 480px 컬럼 (PC에서도 중앙 정렬로 구동) ===== */
.device{
  position:relative;
  max-width:480px;
  min-height:100dvh;
  margin:0 auto;
  background:var(--surface);
  box-shadow:0 0 0 1px var(--line),0 30px 80px rgba(22,24,27,.10);
  overflow:hidden;
}
@media (min-width:520px){
  .device{margin:18px auto;min-height:calc(100dvh - 36px);border-radius:34px}
}

/* eyebrow / 라벨 (영문 대문자 유틸리티 서체감) */
.eyebrow{
  font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;
  color:var(--mint-deep);
}
.serif{font-family:var(--ff-en);font-style:italic;letter-spacing:0}

/* ============================ 헤더 / 로고 ============================ */
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(22px) saturate(180%);
  -webkit-backdrop-filter:blur(22px) saturate(180%);
  border-bottom:1px solid rgba(231,233,236,.9);
}
.brand{
  display:flex;align-items:center;gap:11px;
  padding:14px 20px 12px;
}
.brand img{height:38px;width:auto;display:block;filter:drop-shadow(0 1px 1px rgba(0,0,0,.08))}
/* 로고 로드 전/실패 시 자리표시 (이미지는 GitHub 제공 로고 사용) */
.brand .logo-fallback{
  height:38px;min-width:38px;display:none;align-items:center;justify-content:center;
  border-radius:11px;background:var(--silver);box-shadow:var(--sh-1),inset 0 0 0 1px rgba(255,255,255,.6);
  font-weight:800;color:var(--graphite);font-size:15px;padding:0 8px
}
.brand .wordmark{display:flex;flex-direction:column;line-height:1.05}
.brand .wordmark b{font-size:16.5px;font-weight:800;letter-spacing:-.02em}
.brand .wordmark span{font-size:10px;color:var(--ink-faint);letter-spacing:.04em;margin-top:2px}

/* 메인 탭 */
.tabs{display:flex;gap:6px;padding:0 14px 11px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;border:none;cursor:pointer;
  font-family:var(--ff);font-size:14px;font-weight:600;color:var(--ink-soft);
  padding:9px 16px;border-radius:var(--r-pill);background:transparent;
  transition:.22s;white-space:nowrap;
}
.tab:hover{color:var(--ink)}
.tab.on{
  color:var(--ink);background:var(--surface);
  box-shadow:var(--sh-1),inset 0 0 0 1px var(--line);
}
.tab.on::after{
  content:"";display:block;height:2px;width:18px;margin:5px auto -2px;border-radius:2px;
  background:linear-gradient(90deg,var(--mint),var(--mint-deep));
}

/* 의과 서브탭 (가로 칩 스크롤) */
.subtabs{
  display:none;gap:7px;padding:2px 14px 12px;overflow-x:auto;scrollbar-width:none;
  border-top:1px solid var(--line);padding-top:11px;
}
.subtabs.show{display:flex}
.subtabs::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;cursor:pointer;border:1px solid var(--line);
  background:var(--surface-2);color:var(--ink-soft);
  font-family:var(--ff);font-size:12.5px;font-weight:600;
  padding:7px 13px;border-radius:var(--r-pill);transition:.2s;white-space:nowrap;
}
.chip.on{
  color:#fff;border-color:transparent;
  background:linear-gradient(135deg,var(--graphite),var(--graphite-2));
  box-shadow:var(--sh-1);
}
.chip .mark{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--mint);
  margin-left:6px;vertical-align:middle;box-shadow:0 0 0 2px rgba(84,199,172,.18)}

/* ============================ 본문 영역 ============================ */
main{padding-bottom:42px}
.view{display:none;animation:rise .5s cubic-bezier(.2,.7,.2,1)}
.view.on{display:block}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.pad{padding:0 20px}

/* 이미지 자리표시 (실제 이미지 미포함 — GitHub 추후 삽입) */
.imgph{
  position:relative;border-radius:var(--r-md);overflow:hidden;
  background:
    linear-gradient(135deg,#eceef1,#f6f7f9 50%,#e6e9ec);
  border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  color:var(--ink-faint);font-size:11px;letter-spacing:.04em;
}
.imgph-tag{display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;padding:14px}
.imgph-tag svg{width:26px;height:26px;opacity:.5}

/* ===== HERO (메인) ===== */
.hero{
  position:relative;margin:18px 20px 0;border-radius:var(--r-lg);overflow:hidden;
  background:linear-gradient(165deg,var(--graphite) 0%,#1c1f23 100%);
  color:#fff;box-shadow:var(--sh-2);
  isolation:isolate;
}
.hero::before{ /* 메탈릭 광택 라인 */
  content:"";position:absolute;inset:0;z-index:0;opacity:.5;
  background:
    radial-gradient(420px 220px at 85% -10%, rgba(84,199,172,.28), transparent 60%),
    linear-gradient(120deg, transparent 40%, rgba(255,255,255,.06) 50%, transparent 60%);
}
.hero-in{position:relative;z-index:1;padding:30px 24px 26px}
.hero .rank{
  display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.04em;
  padding:6px 12px;border-radius:var(--r-pill);
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  color:#dff6ef;backdrop-filter:blur(6px);
}
.hero .rank .dot{width:6px;height:6px;border-radius:50%;background:var(--mint);box-shadow:0 0 8px var(--mint)}
.hero h1{font-size:30px;font-weight:800;line-height:1.18;margin:16px 0 6px;letter-spacing:-.03em}
.hero h1 em{font-family:var(--ff-en);font-style:italic;font-weight:600;color:#cfeee6}
.hero .sub{font-size:13.5px;color:#b9c0c6;line-height:1.6;max-width:30ch}
.hero-stats{display:flex;gap:0;margin-top:22px;border-top:1px solid rgba(255,255,255,.1);padding-top:18px}
.hero-stats .s{flex:1;border-right:1px solid rgba(255,255,255,.08)}
.hero-stats .s:last-child{border:none}
.hero-stats .n{font-size:22px;font-weight:800;letter-spacing:-.02em}
.hero-stats .n small{font-size:12px;font-weight:700;color:var(--mint);margin-left:1px}
.hero-stats .l{font-size:10.5px;color:#9aa1a7;margin-top:3px;letter-spacing:.02em}
.hero-photo{height:150px;margin-top:0;border-radius:0}

/* 섹션 공통 */
.section{margin-top:30px}
.section .head{padding:0 20px;margin-bottom:14px}
.section .head .eyebrow{display:block;margin-bottom:7px}
.section .head h2{font-size:21px;font-weight:800;letter-spacing:-.025em}
.section .head p{font-size:13px;color:var(--ink-soft);margin-top:5px;line-height:1.6}

/* 자랑/지표 카드 그리드 */
.feature-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 20px}
.fcard{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  padding:16px;box-shadow:var(--sh-1);position:relative;overflow:hidden;
}
.fcard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--silver)}
.fcard .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  background:var(--mint-soft);color:var(--mint-deep);margin-bottom:11px}
.fcard .ic svg{width:18px;height:18px}
.fcard h3{font-size:14px;font-weight:700}
.fcard p{font-size:12px;color:var(--ink-soft);margin-top:5px;line-height:1.55}

/* 글라스 안내 카드 */
.glass{
  margin:0 20px;border-radius:var(--r-lg);padding:22px;
  background:linear-gradient(135deg,rgba(255,255,255,.85),rgba(247,248,250,.7));
  border:1px solid rgba(255,255,255,.7);
  box-shadow:var(--sh-card),inset 0 1px 0 rgba(255,255,255,.8);
  backdrop-filter:blur(10px);
}
.glass h3{font-size:16px;font-weight:800;letter-spacing:-.02em}
.glass p{font-size:13px;color:var(--ink-soft);line-height:1.7;margin-top:9px}
.quote-mark{font-family:var(--ff-en);font-size:46px;line-height:.5;color:var(--mint);font-style:italic}

/* 가로 배너(병원 전경 자리) */
.banner{margin:0 20px;border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--sh-1)}
.banner .imgph{height:170px;border-radius:0;border:none}

/* footer */
.foot{padding:30px 24px 8px;color:var(--ink-faint);font-size:11px;line-height:1.7;text-align:center}
.foot .line{height:1px;background:var(--line);margin:0 0 18px}

/* ===================== 의과 소개 ===================== */
.dept-hero{padding:24px 20px 4px}
.dept-hero .eyebrow{margin-bottom:9px}
.dept-hero h1{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.1}
.dept-hero .en{font-family:var(--ff-en);font-style:italic;font-size:16px;color:var(--ink-faint);margin-top:4px}
.dept-desc{
  margin:18px 20px 0;background:var(--surface-2);border:1px solid var(--line);
  border-radius:var(--r-md);padding:18px 18px;
}
.dept-desc p{font-size:13.5px;color:#3c4248;line-height:1.78}
.dept-desc p + p{margin-top:10px}

.staff-head{padding:26px 20px 4px;display:flex;align-items:baseline;justify-content:space-between}
.staff-head h2{font-size:17px;font-weight:800;letter-spacing:-.02em}
.staff-head span{font-size:11px;color:var(--ink-faint)}

.staff-list{padding:8px 20px 0;display:flex;flex-direction:column;gap:11px}
.staff{
  position:relative;display:flex;gap:14px;align-items:flex-start;
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  padding:15px;box-shadow:var(--sh-1);transition:.22s;
}
.staff.clickable{cursor:pointer}
.staff.clickable:hover{transform:translateY(-2px);box-shadow:var(--sh-2);border-color:#dfe2e6}
.staff .photo{
  flex:0 0 60px;width:60px;height:74px;border-radius:10px;overflow:hidden;
  background:var(--silver);box-shadow:inset 0 0 0 1px rgba(255,255,255,.6),var(--sh-1);
  display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:9px;text-align:center;
  position:relative;
}
.staff .photo.has-char::after{ /* 지정 캐릭터 표시 점 */
  content:"";position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;
  background:var(--mint);box-shadow:0 0 0 2px #fff,0 0 6px var(--mint);
}
.staff .info{flex:1;min-width:0}
.staff .rank{
  display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.02em;
  color:var(--graphite);background:var(--surface-2);border:1px solid var(--line);
  padding:3px 9px;border-radius:var(--r-pill);
}
.staff .rank.lead{background:linear-gradient(135deg,var(--graphite),var(--graphite-2));color:#fff;border-color:transparent}
.staff .nm{font-size:16px;font-weight:800;margin-top:8px;display:flex;align-items:center;gap:7px}
.staff .nm .go{font-size:11px;font-weight:700;color:var(--mint-deep)}
.staff .meta{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.6}
.staff .meta b{color:#3c4248;font-weight:700}
.staff .paper{
  font-size:11px;color:var(--ink-faint);margin-top:7px;line-height:1.55;
  padding-left:10px;border-left:2px solid var(--mint-soft);
}

/* ===================== 캐릭터 소개 ===================== */
.char-wrap{padding:22px 20px 0}
.char-top{display:flex;gap:16px;align-items:flex-start}

/* ---- 시그니처: 의사 ID 카드 ---- */
.idcard{
  flex:0 0 168px;width:168px;border-radius:18px;overflow:hidden;
  background:var(--silver);
  padding:2px; /* 메탈릭 테두리 */
  box-shadow:var(--sh-2);
  position:relative;
}
.idcard-inner{
  border-radius:16px;overflow:hidden;background:var(--graphite);color:#fff;
  position:relative;
}
.idcard-bar{
  height:30px;display:flex;align-items:center;gap:6px;padding:0 11px;
  background:linear-gradient(135deg,#1d2024,#2b2f35);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.idcard-bar img{height:15px;width:auto;filter:brightness(0) invert(1) opacity(.92)}
.idcard-bar .lf{display:none;font-size:9px;font-weight:800;letter-spacing:.06em;color:#dff6ef}
.idcard-bar span{font-size:8px;letter-spacing:.14em;color:#8b9298;margin-left:auto;font-weight:700}
.idcard-photo{
  height:142px;margin:11px;border-radius:11px;
  background:linear-gradient(135deg,#3a3e44,#23262b);
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;color:#6f767d;font-size:9px;text-align:center;
}
.idcard-body{padding:0 13px 13px}
.idcard-name{font-size:17px;font-weight:800;letter-spacing:-.02em}
.idcard-name small{font-family:var(--ff-en);font-style:italic;font-weight:600;font-size:12px;color:#9aa1a7;margin-left:5px}
.idcard-role{font-size:10.5px;color:var(--mint);font-weight:700;margin-top:3px}
.idcard-strip{
  margin:11px -13px -13px;padding:8px 13px;
  background:linear-gradient(90deg,var(--mint-deep),var(--mint));
  display:flex;justify-content:space-between;align-items:center;
}
.idcard-strip .lbl{font-size:8px;letter-spacing:.1em;color:rgba(255,255,255,.85);font-weight:700;text-transform:uppercase}
.idcard-strip .val{font-size:10px;font-weight:800;color:#fff;letter-spacing:.04em}
/* 보안 미세패턴(귀요체) */
.idcard-inner::after{
  content:"";position:absolute;inset:0;pointer-events:none;opacity:.05;
  background:repeating-linear-gradient(45deg,#fff 0 1px,transparent 1px 7px);
}

.char-meta{flex:1;min-width:0}
.char-meta .eyebrow{margin-bottom:6px}
.char-meta h1{font-size:26px;font-weight:800;letter-spacing:-.03em;line-height:1.12}
.char-meta .dept{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:13px}
.chips .c{
  font-size:11px;font-weight:600;color:var(--ink-soft);
  background:var(--surface-2);border:1px solid var(--line);
  padding:5px 11px;border-radius:var(--r-pill);
}
.chips .c b{color:var(--ink);font-weight:800}

.char-section{margin:22px 20px 0}
.char-section h3{font-size:12px;font-weight:800;letter-spacing:.02em;color:var(--graphite);margin-bottom:10px;
  display:flex;align-items:center;gap:8px}
.char-section h3::before{content:"";width:14px;height:2px;border-radius:2px;background:var(--mint)}
.char-card{
  background:var(--surface);border:1px solid var(--line);border-radius:var(--r-md);
  padding:16px 18px;box-shadow:var(--sh-1);
}
.char-card p{font-size:13px;color:#3c4248;line-height:1.78}
.kv{display:flex;flex-direction:column;gap:9px}
.kv .row{display:flex;gap:12px;font-size:13px}
.kv .row .k{flex:0 0 78px;color:var(--ink-faint);font-weight:600}
.kv .row .v{flex:1;color:#2e3439}
.kv .row .v b{font-weight:800;color:var(--ink)}

.bigquote{
  margin:22px 20px 0;border-radius:var(--r-lg);overflow:hidden;position:relative;
  background:linear-gradient(165deg,var(--graphite),#1b1e22);color:#fff;
  padding:26px 24px;box-shadow:var(--sh-2);
}
.bigquote::before{content:"";position:absolute;inset:0;opacity:.4;
  background:radial-gradient(360px 180px at 90% -20%,rgba(84,199,172,.3),transparent 60%)}
.bigquote .qm{position:relative;font-family:var(--ff-en);font-style:italic;font-size:54px;line-height:.4;color:var(--mint);opacity:.8}
.bigquote q{position:relative;display:block;font-size:18px;font-weight:600;line-height:1.5;margin-top:6px;letter-spacing:-.01em;quotes:none}
.bigquote .who{position:relative;font-size:11px;color:#9aa1a7;margin-top:16px;letter-spacing:.04em}

.backbtn{
  display:inline-flex;align-items:center;gap:7px;cursor:pointer;border:none;
  background:var(--surface-2);border:1px solid var(--line);
  font-family:var(--ff);font-size:12.5px;font-weight:600;color:var(--ink-soft);
  padding:8px 14px;border-radius:var(--r-pill);margin:0 20px 4px;transition:.2s;
}
.backbtn:hover{color:var(--ink);background:#fff}
.backbtn svg{width:14px;height:14px}

a{color:inherit}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
:focus-visible{outline:2px solid var(--mint-deep);outline-offset:2px;border-radius:6px}
</style>
</head>
<body>

<div class="device" id="app">

  <!-- ============================ 헤더 ============================ -->
  <header class="topbar">
    <div class="brand">
      <!-- 병원 공식 로고 (한국어 병원명 포함, GitHub 제공) -->
      <img src="https://raw.githubusercontent.com/yermigionic-web/sruh/refs/heads/main/sruhlogo.png"
           alt="서록대학병원 로고"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="logo-fallback">서록</div>
      <div class="wordmark">
        <b>서록대학병원</b>
        <span>SEOROK UNIVERSITY HOSPITAL</span>
      </div>
    </div>

    <!-- 메인 탭 -->
    <nav class="tabs" id="tabs">
      <button class="tab on" data-tab="home">홈</button>
      <button class="tab" data-tab="about">병원 소개</button>
      <button class="tab" data-tab="dept">의과 소개</button>
      <button class="tab" data-tab="visit">진료 안내</button>
    </nav>

    <!-- 의과 서브탭 (의과 소개 선택 시 노출) -->
    <nav class="subtabs" id="subtabs"></nav>
  </header>

<script>

const clickSound = new Audio("https://github.com/yermigionic-web/sruh/raw/refs/heads/main/click.mp3");

document.addEventListener('pointerdown', (e)=>{

}, true);

/* ================= 의과 서브탭 ================= */
function renderSubtabs(activeId){
  els.subtabs.innerHTML = DATA.departments.map(d=>{
    const hasChar = d.staff.some(s=>s.char);
    return `<button class="chip ${d.id===activeId?'on':''}" data-dept="${d.id}">${d.name}${hasChar?'<span class="mark"></span>':''}</button>`;
  }).join('');
  els.subtabs.querySelectorAll('.chip').forEach(c=>{
    c.addEventListener('click', ()=> openDept(c.dataset.dept));
  });
}

/* ================= (2) 의과 상세 렌더 ================= */
function staffCard(s){
  if(s.char){
    const c = DATA.characters[s.char];
    return `<div class="staff clickable" data-char="${s.char}">
    <div class="photo has-char">
  <!-- 증명사진: ${c.name} -->
  <img src="${RAW}${s.char}.png" alt="${c.name}"
       style="width:100%;height:100%;object-fit:cover;display:block;"
       onerror="this.remove()">
</div>

        <span class="rank ${s.rank==='정교수'?'lead':''}">${s.rank}</span>
        <div class="nm">${c.name} <span class="go">프로필 보기 ›</span></div>
        <div class="meta"><b>${c.school}</b> · ${c.major}</div>

      <div class="meta">${s.career}</div>
      <div class="paper">${s.paper}</div>
    </div>
  </div>`;
}

function openDept(id){
  const idx = DATA.departments.findIndex(x=>x.id===id);  // ← 추가: 순번(0부터)
  const d = DATA.departments[idx];                       // ← 기존 find 대신 이걸로
  if(!d) return;
  setTab('dept');
  renderSubtabs(id);
  els.dept.innerHTML = `
    <div class="dept-hero">
      <span class="eyebrow">Department</span>
      <h1>${d.name}</h1>
      <div class="en">${d.en}</div>

<div class="banner" style="margin-top:18px">

    card.addEventListener('click', ()=> openChar(card.dataset.char));

  <!-- 증명사진: ${c.name} (의과 페이지와 동일 파일) -->
  <img src="${RAW}${key}.png" alt="${c.name}"
       style="width:100%;height:100%;object-fit:cover;border-radius:11px;display:block;"
       onerror="this.remove()">
</div>
            <div class="idcard-body">
              <div class="idcard-name">${c.name}<small>${c.en}</small></div>
              <div class="idcard-role">${c.dept} · ${c.rank}</div>
              <div class="idcard-strip">
                <div><div class="lbl">ID No.</div><div class="val">${c.id}</div></div>
                <div style="text-align:right"><div class="lbl">Since</div><div class="val">${c.since}</div></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ===== 우측 기본 정보 ===== -->
        <div class="char-meta">
          <span class="eyebrow">Profile</span>
          <h1>${c.name}</h1>
          <div class="dept">${c.dept} · ${c.rank}</div>
          <div class="chips">
            <span class="c"><b>${c.gender}</b></span>
            <span class="c"><b>${c.age}</b></span>
            <span class="c">${c.dept}</span>
          </div>
        </div>
      </div>

      <div class="char-section">
        <h3>기본 정보</h3>
        <div class="char-card kv">
          ${c.facts.map(f=>`<div class="row"><div class="k">${f[0]}</div><div class="v">${f[1]}</div></div>`).join('')}
          <div class="row"><div class="k">학력</div><div class="v"><b>${c.school}</b> · ${c.major}</div></div>
        </div>
      </div>

      <div class="char-section">
        <h3>인물 소개</h3>
        <div class="char-card"><p>${c.about}</p></div>
      </div>

      <div class="char-section">
        <h3>말투 & 진료 스타일</h3>
        <div class="char-card"><p>${c.tone}</p></div>
      </div>

      <div class="bigquote">
        <div class="qm">"</div>
        <q>${c.quote}</q>
        <div class="who">— ${c.name}, ${c.dept} ${c.rank}</div>
      </div>

      <div class="foot"><div class="line"></div>서록대학병원 의료진 프로필 · ${c.name}</div>
    </div>
  `;
  els.charV.querySelector('.backbtn').addEventListener('click', e=> openDept(e.currentTarget.dataset.back));
  showView('char');
  scrollTopSoon();
}

/* ================= 뷰/탭 전환 ================= */
function showView(name){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  ({home:els.home, dept:els.dept, char:els.charV})[name].classList.add('on');
}
function setTab(name){
  els.tabs.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===name || (name==='dept'&&t.dataset.tab==='dept')));
  els.subtabs.classList.toggle('show', name==='dept');
}
function scrollTopSoon(){ requestAnimationFrame(()=>{ window.scrollTo({top:0,behavior:'instant'}); document.querySelector('.device').scrollIntoView({block:'start'}); }); }

/* 메인 탭 클릭 */
els.tabs.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>{
    const k = t.dataset.tab;
    if(k==='dept'){
      // 의과 소개 → 첫 의과 자동 오픈
      openDept(DATA.departments[0].id);
      return;
    }
    setTab(k==='home'?'home':k);
    els.tabs.querySelectorAll('.tab').forEach(x=>x.classList.toggle('on', x===t));
    els.subtabs.classList.remove('show');
    showView('home');
    // 홈 내 앵커 이동
    const map={about:'aboutBlock', visit:'visitBlock'};
    if(map[k]){ requestAnimationFrame(()=> document.getElementById(map[k])?.scrollIntoView({behavior:'smooth',block:'start'})); }
    else scrollTopSoon();
  });
});

/* 초기 렌더 */
renderHome();
renderSubtabs();
</script>
</body>
</html>
